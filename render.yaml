services:
  - type: web
    name: hopehaven-fullstack
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_STORAGE
        value: ./database.sqlite
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
