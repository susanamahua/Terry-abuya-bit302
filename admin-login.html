<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login for Hope Haven management portal.">
  <title>Admin Login | Hope Haven</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-msg { background: var(--rose-50); color: var(--danger-600); padding: 10px 16px; border-radius: var(--border-radius-md); font-size: 0.85rem; margin-bottom: var(--space-md); display: none; border: 1px solid var(--rose-200); }
    .error-msg.show { display: block; animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h2>Admin Portal</h2>
        <p>Sign in to manage children, donations & welfare</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-input" id="adminEmail" placeholder="admin@hopehaven.org" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="adminPassword" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign In →</button>
      </form>

      <div class="auth-footer">
        <a href="index.html">← Back to Home</a> &nbsp;|&nbsp; <a href="donor-login.html">Donor Login</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (Auth.isAdmin()) window.location.href = 'admin-dashboard.html';

    async function handleAdminLogin(e) {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const result = await Auth.loginAdmin(email, password);
      if (result.success) {
        window.location.href = 'admin-dashboard.html';
      } else {
        const el = document.getElementById('errorMsg');
        el.textContent = result.message;
        el.classList.add('show');
      }
    }
  </script>
</body>
</html>
